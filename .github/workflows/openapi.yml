name: Upload OpenAPI Specification

on:
  push:
    # Run on pushes targeting the default branch
    branches:
      - main

  # Allow you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build OpenAPI Specification
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Build OpenAPI
        run: |
          make openapi
          mkdir -p docs
          mv openapi.json docs/
      - name: Download Swagger UI
        run: |
          LATEST_TAG=$(curl -sL https://api.github.com/repos/swagger-api/swagger-ui/releases/latest | jq -r ".tag_name")
          curl -sL https://github.com/swagger-api/swagger-ui/archive/refs/tags/$LATEST_TAG.tar.gz -o swagger-ui.tar.gz
          LATEST_RELEASE=$(echo $LATEST_TAG | sed 's/v//')
          tar xvzf swagger-ui.tar.gz --strip-components=1 "swagger-ui-$LATEST_RELEASE/dist"
      - name: Prepare Swagger UI
        run: |
          sed -i "s/https:\/\/petstore.swagger.io\/v2\/swagger.json/openapi.json/g" dist/swagger-initializer.js
          mv dist/* docs/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  # Deployment job
  deploy:
    name: Upload OpenAPI Specification
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
